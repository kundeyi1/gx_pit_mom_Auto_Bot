name: Daily Quant Analysis

on:
  schedule:
    # A 股收盘后多次尝试更新，降低 GitHub Actions 延迟或数据源晚更新的影响
    # 北京时间 15:20 / 15:50 / 16:20 / 17:20
    - cron: '20 7 * * *'
    - cron: '50 7 * * *'
    - cron: '20 8 * * *'
    - cron: '20 9 * * *'
  workflow_dispatch:
    # 手动触发 (用于测试)

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update data (Tushare CITIC + benchmark)
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
        run: |
          echo "=== gx_pit_mom_Auto_Bot 每日数据更新 ==="
          echo "运行时间: $(date -u '+%Y-%m-%d %H:%M UTC')"
          python update_data.py
          echo "=== 数据更新完成 ==="

      - name: Verify Streamlit environment
        run: |
          # 验证 Streamlit 是否能正常导入
          python -c "import streamlit; print(f'Streamlit {streamlit.__version__} ready')"

      - name: Commit updated data (if changes)
        # 自动提交并推送数据产物, 触发 Streamlit Cloud 重新部署
        run: |
          git config user.name "Quant Auto Bot"
          git config user.email "bot@quant.dev"
          git add data/*.xlsx data/group_assignment_details_*.csv data/.last_update 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Auto: update Tushare CITIC data"
            git pull --rebase origin main
            git push
            echo "Data updated and pushed."
          fi
